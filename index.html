<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Collegamento al Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Icona per iOS (Safari non legge bene il manifest per l'icona home) -->
    <link rel="apple-touch-icon" href="logo.png">

    <!-- Colore della barra di stato su mobile -->
    <meta name="theme-color" content="#000000">

    <title>Traiano Booking</title>
    
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
	  <script src="./script/core.js"></script>

  </head>
  <body onload="initializeApp()">
    <h1>Prenotazioni</h1>
    <div class="tabbar">
         <button id="listViewBtn" class="tabButton active" onclick="showListView()">Lista</button>
         <button id="calendarViewBtn" class="tabButton" onclick="showCalendarView()">Calendario</button>
         <button id="graphicViewBtn" class="tabButton" onclick="showGraphicView()">Report  </button>
    </div>

    <div class="content">
        <div id="listView" class="view active">
            <img src="./img/loading.gif" alt="Loading..." id="loadingIndicator" width="50" height="50">
             <!-- La lista delle prenotazioni verrà generata qui dinamicamente -->
        </div>

        <div id="calendarView" class="view">
            <!-- Il calendario verrà generato qui dinamicamente -->
            
        </div>

        <div id="graphicView" class="view">
            <!-- Il grafico verrà generato qui dinamicamente -->
        </div>       

    </div>

  </body>
</html>
